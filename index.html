<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marathon Queue Status</title>

<style>
     @font-face { font-family: Marathon; src: url('PPFraktionMono-Bold.otf');
}

    body {
        font-family: Marathon;
        text-align: center;
        margin-top: 50px;
        margin-left: 10px;
        margin-right: 10px;
        background: #111;
    }

    .numbers {
        margin-bottom: 30px;
        font-size: 24px;
        font-weight: bold;
        display: block;
    }

    .number {
        color: #a3a3a3;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: nowrap;
        width: 100%;
        gap: 10px;
        text-align: left;
    }

    .label-text {
        flex: 1;
        white-space: nowrap;
        text-align: left;
    }

    .meta {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        margin-left: auto;
        gap: 6px;
        min-height: 40px;
        text-align: right;
    }

    .row-item {
        background: #2c2c2c;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 12px;
        padding: 0 20px;
        width: fit-content;
        min-width: 420px;
    }

    .row-content {
        display: flex;
        align-items: center;
        width: 100%;
    }

    .timer-inline {
        display: inline-block;
        margin-left: 0px;
        font-size: 18px;
        color: #d1d1d1;
        white-space: nowrap;
    }

    .duo {
        margin-top: 30px;
        margin-bottom: 30px;
        gap: 30px;
        background: #111;
        text-align: center;
    }

    .inactive {
    color: #555;
}

.duo-image {
    height: 60px;
    vertical-align: middle;
    margin-right: 0px;
}
.ranked-image {
    height: 60px;
    vertical-align: middle;
    margin-left: 2px;
}
.lock-image {
    height: 40px;
    vertical-align: middle;
    margin-left: 2px;
}

.ranked-notice {
    display: block;
    color: #d1d1d1;
    font-size: 14px;
    margin-top: 6px;
}

/* Responsive adjustments for smaller screens */
@media (max-width: 900px) {
    body { margin-top: 30px; }
    .numbers { font-size: 20px; }
    .label-text { font-size: 18px; }
    .row-item {         box-sizing: border-box;
        width: calc(100% - 12px) !important;
        min-width: calc(100% - 12px) !important;
        max-width: calc(100% - 12px) !important;
        height: 50px;
        padding: 0 6px; }
    .duo-image, .ranked-image { height: 50px; }
    .lock-image { height: 32px; }
    .timer-inline { font-size: 16px; margin-left: 4px; }
    .ranked-notice { font-size: 13px; }
}

@media (max-width: 480px) {
    body { margin-top: 20px; }
    .numbers { font-size: 18px; }
    .label-text { font-size: 16px; }
    .row-item {
        box-sizing: border-box;
        width: calc(100% - 12px) !important;
        min-width: calc(100% - 12px) !important;
        max-width: calc(100% - 12px) !important;
        height: 44px;
        padding: 0 6px;
    }
    .duo-image, .ranked-image { height: 44px; }
    .lock-image { height: 28px; }
    .timer-inline { font-size: 14px; margin-left: 4px; }
    .ranked-notice { font-size: 11px; }
}

</style>
</head>
<body>

    <div class="duo">
<div class="numbers">
    <div class="row-item"><div class="row-content"><span id="n1" class="number"><span class="label-text">PERIMETER</span><span class="meta"><span id="tag1"></span></span></span></div></div>

    <div class="row-item"><div class="row-content"><span id="n2" class="number"><span class="label-text">DIRE MARSH</span><span class="meta"><span id="tag2"></span></span></span></div></div>

    <div class="row-item"><div class="row-content"><span id="n3" class="number"><span class="label-text">DIRE MARSH NIGHT</span><span class="meta"><span id="tag3"></span></span></span></div></div>

    <div class="row-item"><div class="row-content"><span id="n4" class="number"><span class="label-text">OUTPOST</span><span class="meta"><span id="tag4"></span></span></span></div></div>

    <div class="row-item"><div class="row-content"><span id="n5" class="number"><span class="label-text">CRYO ARCHIVE</span><span class="meta"><span id="tag5"></span></span></span></div></div>
</div>
</div>

<script>
function updateDisplay() {

    function updateLockIndicators() {
        for (let i = 1; i <= 5; i++) {
            const span = document.getElementById("n" + i);
            const meta = span.querySelector(".meta");
            const existingLock = meta.querySelector(".lock-image");

            if (span.classList.contains("inactive")) {
                if (!existingLock) {
                    const lockImage = document.createElement("img");
                    lockImage.src = "Lock.png";
                    lockImage.alt = "Locked";
                    lockImage.className = "lock-image";
                    meta.appendChild(lockImage);
                }
            } else if (existingLock) {
                existingLock.remove();
            }
        }
    }

    function clearInlineTimers() {
        for (let i = 1; i <= 5; i++) {
            const span = document.getElementById("n" + i);
            const meta = span.querySelector(".meta");
            meta.querySelectorAll(".timer-inline").forEach((timer) => timer.remove());
        }
    }

    function appendInlineTimer(spanId, text) {
        const span = document.getElementById(spanId);
        const meta = span.querySelector(".meta");
        const timer = document.createElement("span");
        timer.className = "timer-inline";
        timer.textContent = text;
        meta.appendChild(timer);
    }

    function pad2(n) {
        return String(n).padStart(2, '0');
    }

    const warsawTime = new Date().toLocaleString("en-US", {
        timeZone: "Europe/Warsaw"
    });

    const now = new Date(warsawTime);
    const cryoState = updateCryoArchive(now);

    // Reference point:
    // 12.07.2026 19:00 Warsaw => highlighted number 3
    const startDate = new Date(2026, 6, 12, 19, 0, 0);

    let daysPassed = Math.floor(
        (now - startDate) / (24 * 60 * 60 * 1000)
    );

    if (daysPassed < 0) {
        daysPassed = 0;
    }

    const sequence = [3, 4, 1, 2];
    const activeNumber = sequence[daysPassed % 4];

// Clear all Duo tags
for (let i = 1; i <= 4; i++) {
    const tag = document.getElementById("tag" + i);
    tag.textContent = "";
    tag.replaceChildren();
}

// Add Duo image to current map
const activeTag = document.getElementById("tag" + activeNumber);
activeTag.textContent = "";
const duoImage = document.createElement("img");
duoImage.src = "DuoLogo.png";
duoImage.alt = "Duo";
duoImage.className = "duo-image";
activeTag.appendChild(duoImage);

    // Calculate next 19:00 Warsaw
    const nextChange = new Date(now);

    if (now.getHours() >= 19) {
        nextChange.setDate(nextChange.getDate() + 1);
    }

    nextChange.setHours(19, 0, 0, 0);

    const diff = nextChange - now;

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor(
        (diff % (1000 * 60 * 60)) / (1000 * 60)
    );

// Day Night
    document.getElementById("n2").classList.remove("inactive");
document.getElementById("n3").classList.remove("inactive");

const cycleStart = new Date(2026, 6, 12, 19, 0, 0);
const cycleLength = 90 * 60 * 1000;

const cycleNumber = Math.floor(
    (now - cycleStart) / cycleLength
);

if (cycleNumber % 2 === 0) {
    document.getElementById("n3").classList.add("inactive");
} else {
    document.getElementById("n2").classList.add("inactive");
}

updateLockIndicators();

// Calculate time remaining for 1.5h cycle
const nextCycleChange = new Date(
    cycleStart.getTime() + (cycleNumber + 1) * cycleLength
);

const cycleDiff = nextCycleChange - now;

const cycleHours = Math.floor(
    cycleDiff / (1000 * 60 * 60)
);

const cycleMinutes = Math.floor(
    (cycleDiff % (1000 * 60 * 60)) / (1000 * 60)
);

// Cryo Archive
function updateCryoArchive(now) {
    const cryo = document.getElementById("n5");

    cryo.classList.remove("inactive");

    const day = now.getDay(); // 0=Sun, 1=Mon, ..., 4=Thu
    const hour = now.getHours();

    let active = false;

    if (day === 4 && hour >= 19) {
        active = true;
    } else if (day === 5) {
        active = true;
    } else if (day === 6) {
        active = true;
    } else if (day === 0 && hour < 19) {
        active = true;
    }

    if (!active) {
        cryo.classList.add("inactive");
    }

    let nextChange = new Date(now);
    let timerText = "";

    if (active) {
        const daysUntilSunday = (7 - day) % 7;
        nextChange.setDate(now.getDate() + daysUntilSunday);
        nextChange.setHours(19, 0, 0, 0);

        if (day === 0 && hour >= 19) {
            nextChange.setDate(nextChange.getDate() + 7);
        }

        const diff = nextChange - now;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        timerText = `Cryo Archive active for ${pad2(h)}h ${pad2(m)}m more`;
    }
    else {
        const daysUntilThursday = (4 - day + 7) % 7;

        nextChange.setDate(now.getDate() + daysUntilThursday);
        nextChange.setHours(19, 0, 0, 0);

        if (day === 4 && hour >= 19) {
            nextChange.setDate(nextChange.getDate() + 7);
        }

        const diff = nextChange - now;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        timerText = `${pad2(h)}h ${pad2(m)}m`;
    }

    return { active, timerText };
}

// Ranked
function updateRanked(now) {
    // remove existing ranked images and notices
    for (let i = 1; i <= 5; i++) {
        const span = document.getElementById("n" + i);
        const meta = span.querySelector(".meta");
        const existing = meta.querySelector(".ranked-image");
        if (existing) existing.remove();
        const rowItem = span.closest('.row-item');
        if (rowItem) {
            const existingNotice = rowItem.querySelector('.ranked-notice');
            if (existingNotice) existingNotice.remove();
        }
    }

    // rotation sequence (exclude n3 and n5)
    const reference = new Date(2026, 6, 12, 19, 0, 0); // Sunday 12.07.2026 19:00
    let weeksPassed = Math.floor((now - reference) / (7 * 24 * 60 * 60 * 1000));
    if (weeksPassed < 0) weeksPassed = 0;
    const seq = [2, 4, 1]; // starts at n2 on reference date
    const idx = weeksPassed % seq.length;
    const target = seq[idx];
    const spanId = "n" + target;

    const day = now.getDay(); // 0=Sun
    const hour = now.getHours();

    // active between Sunday 19:00 and Thursday 19:00
    let active = false;
    if ((day === 0 && hour >= 19) || (day >= 1 && day <= 3) || (day === 4 && hour < 19)) {
        active = true;
    }

    let nextChange = new Date(now);
    let timerText = "";

    if (active) {
        // next change is Thursday 19:00
        let daysUntilThursday = (4 - day + 7) % 7;
        nextChange.setDate(now.getDate() + daysUntilThursday);
        nextChange.setHours(19, 0, 0, 0);
        if (day === 4 && hour >= 19) {
            nextChange.setDate(nextChange.getDate() + 7);
        }
        const diff = nextChange - now;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        timerText = `${pad2(h)}h ${pad2(m)}m`;

        // append ranked image to the target span, after lock-image and its timers
        if (target !== 3 && target !== 5) {
            const span = document.getElementById(spanId);
            const meta = span.querySelector('.meta');
            const tag = document.getElementById('tag' + target);
            tag.textContent = '';
            const img = document.createElement('img');
            img.src = 'ranked.png';
            img.alt = 'Ranked';
            img.className = 'ranked-image duo-image';

            // find last node among lock-image and timer-inline
            let last = null;
            Array.from(meta.children).forEach((ch) => {
                if (ch.classList && (ch.classList.contains('lock-image') || ch.classList.contains('timer-inline'))) {
                    last = ch;
                }
            });

            if (last && last.nextSibling) {
                meta.insertBefore(img, last.nextSibling);
            } else if (last) {
                meta.appendChild(img);
            } else {
                // nothing to place after, append to meta
                meta.appendChild(img);
            }

            // insert ranked timer immediately after the ranked image
            const timerEl = document.createElement('span');
            timerEl.className = 'timer-inline';
            timerEl.textContent = timerText;
            if (img.nextSibling) meta.insertBefore(timerEl, img.nextSibling);
            else meta.appendChild(timerEl);
        }
    } else {
        // next activation is next Sunday 19:00
        const daysUntilSunday = (7 - day) % 7;
        nextChange.setDate(now.getDate() + daysUntilSunday);
        nextChange.setHours(19, 0, 0, 0);
        if (day === 0 && hour >= 19) {
            nextChange.setDate(nextChange.getDate() + 7);
        }
        const diff = nextChange - now;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        timerText = `${pad2(h)}h ${pad2(m)}m`;

        // build message for all spans
        const targetLabel = (function() {
            try {
                const lbl = document.querySelector('#' + spanId + ' .label-text');
                return lbl ? lbl.textContent : '';
            } catch (e) { return ''; }
        })();

        const message = `RANKED WILL BE ACTIVE FOR ${targetLabel} in ${timerText}`;

        // append the message under each row
        for (let i = 1; i <= 5; i++) {
            const span = document.getElementById('n' + i);
            const rowItem = span.closest('.row-item');
            if (rowItem) {
                const notice = document.createElement('div');
                notice.className = 'ranked-notice';
                notice.textContent = message;
                rowItem.appendChild(notice);
            }
        }
    }

    return { active, timerText, spanId };
}

    clearInlineTimers();
    appendInlineTimer("n" + activeNumber, `${pad2(hours)}h ${pad2(minutes)}m`);

    const cycleRowId = (cycleNumber % 2 === 0) ? "n3" : "n2";
    appendInlineTimer(cycleRowId, `${pad2(cycleHours)}h ${pad2(cycleMinutes)}m`);

    appendInlineTimer("n5", cryoState.timerText);

    updateRanked(now);
}

updateDisplay();
setInterval(updateDisplay, 1000);
</script>

</body>
</html>
